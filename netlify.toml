[build]
  command = "pnpm build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "22"

# Custom 404 page
[[redirects]]
  from = "/*"
  to = "/404"
  status = 404

# Cache Sanity CDN images aggressively
[[headers]]
  for = "/_astro/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
